name: Daily Fund Limit Monitor

on:
  schedule:
    # 国际标准时间 (UTC) 05:30 是北京时间 13:30
    - cron: '30 5 * * 1-5'
  workflow_dispatch: # 允许你手动点击运行测试

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Prepare report
        env:
          TZ: Asia/Shanghai
          REPORT_IMAGE_BASE_URL: https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/reports
          REPORT_IMAGE_DIR: reports
        run: python monitor.py --prepare-report --report-output .report/latest.json

      - name: Commit report assets
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.json reports
          git commit -m "Update report assets [skip ci]" || echo "No changes to commit"
          git push

      - name: Send report
        env:
          # 从保险箱取出 Webhook 链接交给程序
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          TZ: Asia/Shanghai
        run: python monitor.py --send-report .report/latest.json
